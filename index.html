<!DOCTYPE html>
<html>
<head>
<title>PhishPersona AI Scanner</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0b0202;
color:#ffe9d6;
overflow-x:hidden;
}

/* CYBER GRID BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,80,0,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,140,0,0.08) 1px, transparent 1px);
background-size:40px 40px;
z-index:0;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:0;
pointer-events:none;
}

/* MAIN PANEL */

.container{
position:relative;
z-index:1;
max-width:760px;
margin:80px auto;
padding:45px;
border-radius:22px;

background:rgba(30,5,0,0.9);
backdrop-filter:blur(20px);

box-shadow:
0 0 80px rgba(255,60,0,0.6),
0 0 40px rgba(255,150,0,0.4);

border:1px solid rgba(255,120,0,0.5);
}

/* TITLE */

h1{
text-align:center;
font-size:38px;
color:#ff8c00;

text-shadow:
0 0 10px #ff4500,
0 0 20px #ff4500,
0 0 40px #ff8c00;

margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#ffc27a;
margin-bottom:35px;
}

/* TEXTAREA */

textarea{
width:100%;
padding:18px;
border-radius:14px;
border:none;
outline:none;
font-size:16px;

background:rgba(0,0,0,0.45);
color:white;

box-shadow:inset 0 0 20px rgba(255,80,0,0.6);
}

textarea::placeholder{
color:#ffb27d;
}

/* BUTTON */

button{
margin-top:22px;
width:100%;
padding:16px;
border:none;
border-radius:14px;

background:linear-gradient(135deg,#ff3c00,#ffae00);

font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;

box-shadow:
0 0 20px #ff4500,
0 0 40px #ffae00;

transition:0.3s;
}

button:hover{
transform:scale(1.05);

box-shadow:
0 0 30px #ff4500,
0 0 60px #ffae00;
}

/* RESULT PANEL */

.result{
margin-top:35px;
padding:30px;
border-radius:18px;

background:rgba(255,80,0,0.08);

box-shadow:
0 0 30px #ff4500,
0 0 20px #ffae00;

animation:fadeIn 0.6s ease;
}

.result h2{
color:#ffae00;
text-shadow:0 0 10px #ff4500;
margin-bottom:15px;
}

.result div{
font-size:16px;
color:#ffd8c2;
margin-top:5px;
}

/* LINKS */

.links{
margin-top:35px;
text-align:center;
}

.links a{
color:#ffae00;
text-decoration:none;
margin:0 20px;
font-weight:bold;
font-size:16px;
transition:0.3s;
}

.links a:hover{
text-shadow:
0 0 10px #ff4500,
0 0 20px #ffae00;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">

<h1>🛡 PHISHPERSONA</h1>
<div class="subtitle">AI Behavioral Phishing Detection Engine</div>

<form method="POST">

<textarea name="message" rows="6" required
placeholder="Paste suspicious SMS / Email / Message here...">{{ user_message }}</textarea>

<button type="submit">⚡ Analyze Message</button>

</form>

{% if prediction_text %}

<div class="result">

<h2>{{ prediction_text }}</h2>

<div>{{ probability_text }}</div>

<div>{{ technique_text }}</div>

</div>

{% endif %}

<div class="links">

<a href="/profile">🧬 Cyber Risk DNA</a>

<a href="/adaptive">🎯 Adaptive Simulation</a>

</div>

</div>

<script>

const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');

let width=canvas.width=window.innerWidth;
let height=canvas.height=window.innerHeight;

class Particle{

constructor(){
this.x=Math.random()*width;
this.y=Math.random()*height;
this.size=Math.random()*5+2;

this.speedX=(Math.random()-0.5)*1.5;
this.speedY=(Math.random()-0.5)*1.5;

this.color=`rgba(255,120,0,${Math.random()*0.7+0.2})`;
}

update(){
this.x+=this.speedX;
this.y+=this.speedY;

if(this.x<0||this.x>width)this.speedX*=-1;
if(this.y<0||this.y>height)this.speedY*=-1;
}

draw(){

ctx.fillStyle=this.color;
ctx.shadowColor=this.color;
ctx.shadowBlur=20;

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();

}

}

const particles=[];

for(let i=0;i<90;i++){
particles.push(new Particle());
}

function animate(){

ctx.clearRect(0,0,width,height);

particles.forEach((p,i)=>{

p.update();
p.draw();

for(let j=i;j<particles.length;j++){

let dx=p.x-particles[j].x;
let dy=p.y-particles[j].y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){

ctx.beginPath();
ctx.strokeStyle='rgba(255,120,0,0.1)';
ctx.moveTo(p.x,p.y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.stroke();

}

}

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener('resize',()=>{

width=canvas.width=window.innerWidth;
height=canvas.height=window.innerHeight;

});

</script>

</body>
</html>
